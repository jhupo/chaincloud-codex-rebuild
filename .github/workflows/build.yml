name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, mac, windows, linux]

env:
  NODE_VERSION: "24"
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

permissions:
  contents: read

jobs:
  build-mac:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'mac'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          brew install --quiet sevenzip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: node scripts/verify-chaincloud-config-patch.js mac-${{ matrix.arch }}
      - run: npm run build:mac-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg

  build-windows:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          choco install 7zip -y
      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - run: node scripts/sync-upstream.js --force --skip-mac
      - run: node scripts/patch-all.js win
      - run: node scripts/verify-fast-mode-bundle.js win
      - run: node scripts/verify-chaincloud-config-patch.js win
      - run: npm run build:win-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64
          path: out/*.zip
          if-no-files-found: error

  build-linux:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - name: Use Electron mirror
        run: echo "ELECTRON_MIRROR=${ELECTRON_MIRROR}" >> $GITHUB_ENV
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: node scripts/verify-chaincloud-config-patch.js mac-${{ matrix.arch }}
      - run: npm run build:linux-${{ matrix.arch }}
      - name: Ensure Linux artifact exists
        shell: bash
        run: |
          set -euo pipefail
          if [ -d out ]; then
            find out -maxdepth 4 -type f -o -type d
          fi
          if find out/make -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.zip' \) | grep -q .; then
            exit 0
          fi
          PACKAGE_DIR="$(find out -maxdepth 1 -type d -name 'Codex-linux-*' | head -n 1 || true)"
          if [ -z "$PACKAGE_DIR" ]; then
            echo "::error::No Linux package directory found in out/"
            find out -maxdepth 3 -type f -o -type d
            exit 1
          fi
          mkdir -p "out/make/zip/linux/${{ matrix.arch }}"
          ZIP_PATH="$GITHUB_WORKSPACE/out/make/zip/linux/${{ matrix.arch }}/Codex-linux-${{ matrix.arch }}-${{ github.ref_name }}.zip"
          (cd "$PACKAGE_DIR" && 7z a -tzip "$ZIP_PATH" .)
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -lhR artifacts/

      - name: Create Windows delta update
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! command -v unzip >/dev/null || ! command -v zip >/dev/null; then
            sudo apt-get update && sudo apt-get install -y zip unzip || echo "::warning::Could not install zip tools; delta generation may be skipped"
          fi
          mkdir -p previous-release artifacts-delta
          PREV_TAG="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 30 --json tagName,isDraft,isPrerelease --jq '.[] | select(.isDraft == false and .isPrerelease == false) | .tagName' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-chaincloud\.[0-9]+$' | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)"
          if [ -n "$PREV_TAG" ]; then
            echo "Previous ChainCloud release: $PREV_TAG"
            gh release download "$PREV_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'Codex-win-x64-*.zip' --dir previous-release --clobber || true
          else
            echo "No previous ChainCloud release found; skipping delta asset"
          fi
          CURRENT_WIN_ZIP="$(find artifacts -type f -name 'Codex-win-x64-*.zip' | head -n 1 || true)"
          PREVIOUS_WIN_ZIP="$(find previous-release -type f -name 'Codex-win-x64-*.zip' | head -n 1 || true)"
          node scripts/create-windows-delta-update.js --current "$CURRENT_WIN_ZIP" --previous "$PREVIOUS_WIN_ZIP" --out-dir artifacts-delta --from-tag "$PREV_TAG" --to-tag "$GITHUB_REF_NAME" || echo "::warning::Windows delta generation failed; publishing full release only"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Codex ${{ github.ref_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
          draft: false
          fail_on_unmatched_files: true

      - name: Upload Windows delta update
        if: ${{ hashFiles('artifacts-delta/**/*.patch.zip') != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts-delta/**/*.patch.zip
          fail_on_unmatched_files: true
