name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: false
        default: "all"
        type: choice
        options: [all, mac, windows, linux]

env:
  NODE_VERSION: "24"
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

permissions:
  contents: read

jobs:
  build-mac:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'mac'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          brew install --quiet sevenzip
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:mac-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg

  build-windows:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          choco install 7zip -y
      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - run: node scripts/sync-upstream.js --force --skip-mac
      - run: node scripts/patch-all.js win
      - run: npm run build:win-x64
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64
          path: out/*.zip
          if-no-files-found: error

  build-linux:
    if: github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: |
          npm ci
      - run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg 7zip
      - name: Use Electron mirror
        run: echo "ELECTRON_MIRROR=${ELECTRON_MIRROR}" >> $GITHUB_ENV
      - run: node scripts/sync-upstream.js --force --skip-win
      - run: node scripts/patch-all.js mac-${{ matrix.arch }}
      - run: npm run build:linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: Codex-Linux-${{ matrix.arch }}
          path: |
            out/make/deb/**/*.deb
            out/make/rpm/**/*.rpm
            out/make/zip/**/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Codex ${{ github.ref_name }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.deb
            artifacts/**/*.rpm
          draft: false
          fail_on_unmatched_files: true
